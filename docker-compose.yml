# Manufacturing AX Agent — Docker Compose (전체 배포용)
# PostgreSQL + Neo4j + FastAPI Backend + React Frontend
# 실행: docker-compose up -d

services:
  # PostgreSQL + TimescaleDB + pgvector
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: ax-postgres
    environment:
      POSTGRES_DB: ax_agent
      POSTGRES_USER: ax_user
      POSTGRES_PASSWORD: ax_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/home/postgres/pgdata/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ax_user -d ax_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Neo4j (온톨로지 지식 그래프)
  neo4j:
    image: neo4j:5-community
    container_name: ax-neo4j
    environment:
      NEO4J_AUTH: neo4j/ax_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: ax-backend
    environment:
      DATABASE_URL_SYNC: postgresql://ax_user:ax_password@postgres:5432/ax_agent
      DATABASE_URL: postgresql+asyncpg://ax_user:ax_password@postgres:5432/ax_agent
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ax_password
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  # React Frontend (Nginx)
  frontend:
    build: ./frontend
    container_name: ax-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
  neo4j_data:
